<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}forge-agent Dashboard{% endblock %}</title>
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- HTMX for dynamic interactions -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-gray-50">
    <div class="min-h-screen">
        <!-- Header -->
        <header class="bg-white shadow-sm border-b border-gray-200">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
                <div class="flex items-center justify-between">
                    <div class="flex items-center space-x-3">
                        <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center">
                            <span class="text-white font-bold text-lg">⚡</span>
                        </div>
                        <h1 class="text-2xl font-bold text-gray-900">forge-agent</h1>
                    </div>
                    <nav class="flex space-x-4">
                        <a href="/" class="text-gray-600 hover:text-indigo-600 px-3 py-2 rounded-md text-sm font-medium">Agents</a>
                        <a href="/create" class="bg-indigo-600 text-white hover:bg-indigo-700 px-3 py-2 rounded-md text-sm font-medium">+ Create</a>
                        <a href="/traces" class="text-gray-600 hover:text-indigo-600 px-3 py-2 rounded-md text-sm font-medium">Traces</a>
                        <a href="/metrics" class="text-gray-600 hover:text-indigo-600 px-3 py-2 rounded-md text-sm font-medium">Metrics</a>
                        <a href="/reports" class="text-gray-600 hover:text-indigo-600 px-3 py-2 rounded-md text-sm font-medium">Reports</a>
                    </nav>
                </div>
            </div>
        </header>

        <!-- Main content -->
        <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            {% block content %}{% endblock %}
        </main>

        <!-- Footer -->
        <footer class="bg-white border-t border-gray-200 mt-auto">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
                <p class="text-center text-sm text-gray-500">
                    forge-agent v0.3.0 — Local observability dashboard
                </p>
            </div>
        </footer>
    </div>

    {% block extra_scripts %}{% endblock %}
</body>
</html>
