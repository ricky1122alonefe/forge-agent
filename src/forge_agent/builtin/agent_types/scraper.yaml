agent_type:
  type_id: scraper
  name: Data Scraper
  description: |
    Fetches data from an external source (social media, API, web page)
    and produces a structured trend assessment.
  domain: generic
  template: prompt_agent
  params:
    - name: keyword
      type: string
      required: true
      description: Keyword or IP to search for.
    - name: platform
      type: string
      required: true
      description: Platform to scrape (e.g. weibo, xiaohongshu, dewu, douyin).
    - name: tool
      type: string
      required: true
      description: Name of the built-in tool that performs the scrape.
  tools:
    - "{tool}"
  prompt_template: |
    You are a trend analysis expert. Analyze the following {platform} data
    for the keyword/IP 「{keyword}」 and judge its current trend.

    Data:
    {data}

    Respond with a JSON object containing:
    - verdict: one of [lean_positive, lean_neutral, lean_negative, risk]
    - confidence: a number between 0.0 and 1.0
    - risk: a number between 0.0 and 1.0
    - evidence: a list of short strings explaining your reasoning
    - recommended_action: one of [execute, watch, hold, alert]
    - metrics: an object with any relevant numeric metrics
  output_schema:
    type: object
    properties:
      verdict:
        type: string
        enum: [lean_positive, lean_neutral, lean_negative, risk]
      confidence:
        type: number
        minimum: 0
        maximum: 1
      risk:
        type: number
        minimum: 0
        maximum: 1
      evidence:
        type: array
        items:
          type: string
      recommended_action:
        type: string
        enum: [execute, watch, hold, alert]
      metrics:
        type: object
    required: [verdict, confidence, risk, evidence, recommended_action, metrics]
  output_mapping:
    verdict: verdict
    confidence: confidence
    risk: risk
    evidence: evidence
    recommended_action: recommended_action
    metrics: metrics
  mock_response: |
    {"verdict": "lean_positive", "confidence": 0.82, "risk": 0.15,
     "evidence": ["High engagement on {platform}"],
     "recommended_action": "watch", "metrics": {}}
