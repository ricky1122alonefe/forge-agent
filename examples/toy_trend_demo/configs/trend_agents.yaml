# 潮玩趋势情报官 - 平台专家配置
# 默认 mock_mode=true，无需 API key 即可跑通 demo。
# 接入真实 LLM 或真实 scraper 时，将 mock_mode 改为 false。

agents:
  - agent_id: trend.weibo
    name: 微博热度专家
    domain: toy_trend
    template: scraper_agent
    tags: [social, weibo]
    config:
      platform: weibo
      tools: [weibo.hot_search]
      keyword_variable: keyword
      provider: openai
      model: gpt-4o-mini
      temperature: 0.2
      mock_mode: true
      mock_response: |
        {
          "verdict": "lean_positive",
          "confidence": 0.82,
          "risk": 0.15,
          "evidence": [
            "微博热搜中 {keyword} 相关话题上榜 3 条，总阅读量过亿。",
            "评论区以正面情绪为主，大量用户表示「想冲」。"
          ],
          "recommended_action": "execute",
          "metrics": {"matched_topics": 3, "total_heat": 120000000}
        }
      prompt: |
        你是一位微博舆情分析专家。请分析以下微博热搜数据，判断关键词「{keyword}」相关的潮玩热度趋势。

        数据：
        {data}

        请输出 JSON：
        {
          "verdict": "lean_positive|lean_neutral|lean_negative|risk",
          "confidence": 0.0-1.0,
          "risk": 0.0-1.0,
          "evidence": ["关键发现1", "关键发现2"],
          "recommended_action": "execute|watch|hold|alert",
          "metrics": {"matched_topics": 0, "total_heat": 0}
        }
      output_schema:
        verdict: str
        confidence: float
        risk: float
        evidence: list[str]
        recommended_action: str
        metrics: dict
      output_mapping:
        verdict: verdict
        confidence: confidence
        risk: risk
        evidence: evidence
        recommended_action: recommended_action
        metrics: metrics

