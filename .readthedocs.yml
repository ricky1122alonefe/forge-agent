# .readthedocs.yml — Read the Docs configuration
# Docs: https://docs.readthedocs.io/en/stable/config-file/v2.html

version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.11"

python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - dev

mkdocs:
  configuration: mkdocs.yml

# Don't build warnings as errors (be lenient during dev)
formats:
  - htmlzip
  - pdf
  - epub
