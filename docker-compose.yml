version: '3.8'

services:
  dashboard:
    build: .
    ports:
      - "8765:8765"
    volumes:
      - ./generated_agents:/app/generated_agents:ro
      - forge-data:/data
    environment:
      - FORGE_AGENT_AUTH_ENABLED=false
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8765/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # Optional: with authentication
  dashboard-auth:
    build: .
    ports:
      - "8766:8765"
    volumes:
      - ./generated_agents:/app/generated_agents:ro
      - forge-data:/data
    environment:
      - FORGE_AGENT_AUTH_ENABLED=true
      - FORGE_AGENT_API_KEY=${FORGE_AGENT_API_KEY:-changeme}
    restart: unless-stopped
    profiles:
      - auth

volumes:
  forge-data:
